apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-rules
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zhangtao1994hk/argocd-apps
    targetRevision: HEAD
    path: prometheus/rules          # ← 指向规则目录
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

