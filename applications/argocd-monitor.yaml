apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-monitor
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: 'https://github.com/zhangtao1994hk/argocd-apps'
    targetRevision: HEAD
    path: argocd-monitor 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd # 监控资源部署到 argocd 命名空间
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
