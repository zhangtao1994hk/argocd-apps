apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/zhangtao1994hk/argocd-apps.git'
    path: infrastructure/kube-prometheus-stack
    targetRevision: HEAD
    helm:
      valueFiles:
        - prometheus-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # 关键：使用 SSA 避免 Annotation 超限
  
  # 3. 终极防漂移配置：彻底消除 OutOfSync
  ignoreDifferences:
    - group: "*"
      kind: "*"
      jsonPointers:
        - /metadata/managedFields
    - group: "apiextensions.k8s.io"
      kind: "CustomResourceDefinition"
      jsonPointers:
        - /metadata/annotations
        - /status
    - group: "monitoring.coreos.com"
      kind: "Prometheus"
      jsonPointers:
        - /status
