apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/zhangtao1994hk/argocd-apps.git'
    targetRevision: HEAD
    path: infrastructure/prometheus # 只要这里有 values.yaml，ArgoCD 就能找到
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
  syncOptions:
      - CreateNamespace=true 
      - ServerSideApply=true 
      - Replace=true 
