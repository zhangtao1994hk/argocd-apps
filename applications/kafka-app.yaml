apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 32.4.3
    helm:
      values: |
        # ── 单节点集群 ──
        controller:
          replicaCount: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          persistence:
            enabled: true
            size: 5Gi

        # ── KRaft 模式（v32 已移除 Zookeeper）──
        kraftVersion: 1

        # ── 纯 PLAINTEXT（关闭 SASL，适合集群内部中间件）──
        listeners:
          client:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
          controller:
            protocol: PLAINTEXT

        # ── Heap 配置 ──
        heapOpts: -Xmx256m -Xms128m

        # ── 日志保留（通过 config 注入）──
        config: |
          log.retention.hours=72
          log.retention.bytes=10737418240
          log.segment.bytes=268435456

        # ── 指标 + ServiceMonitor ──
        metrics:
          jmx:
            enabled: true
          serviceMonitor:
            enabled: true
            namespace: middleware
            labels:
              release: kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: middleware
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
