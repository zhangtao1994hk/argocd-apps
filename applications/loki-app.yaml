apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.55.0 # 你指定的版本
    helm:
      values: |
        # 1. 禁用多租户 (解决你的 401 错误)
        loki:
          useTestSchema: true
          auth_enabled: false
        
        # 2. 部署模式
        deploymentMode: SingleBinary
        
        # 3. 单节点副本设置
        singleBinary:
          replicas: 1
        
        # 4. 存储配置 (使用本地文件系统)
        loki:
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
        
        # 5. 禁用不必要的网关和读取器（单节点模式下）
        gateway:
          enabled: false
        write:
          replicas: 0
        read:
          replicas: 0
        backend:
          replicas: 0

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
