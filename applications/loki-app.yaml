apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    targetRevision: 6.57.0
    helm:
      valueFiles:
        - values.yaml
      values: |
        loki:
          useTestSchema: true
          common:
            storage:
              backend: filesystem
          storage:
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin
          singleBinary:
            persistence:
              enabled: true
              size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
