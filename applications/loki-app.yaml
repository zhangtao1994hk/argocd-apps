apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-app
  namespace: argocd
spec:
  project: default
  source:
    # 这里的 repoURL 指向 Grafana 官方 Helm 仓库
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.55.0
    helm:
      # 你直接在这里通过 values 字段写配置，或者指向 Git 中的路径
      # 如果想直接用 Git 中的文件，请参考上面的多源配置。
      # 但为了快速成功，我建议直接把 values 贴在这里：
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
        backend:
          replicas: 0
        write:
          replicas: 0
        read:
          replicas: 0
        gateway:
          enabled: false
        singleBinary:
          replicas: 1
        # 调整缓存内存配置以匹配实际使用
        chunksCache:
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 200Mi
        resultsCache:
          resources:
            requests:
              cpu: 50m
              memory: 50Mi
            limits:
              cpu: 100m
              memory: 100Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
