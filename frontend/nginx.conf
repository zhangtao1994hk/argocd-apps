server {
    listen 5000;
    server_name localhost;

    # 1. Vue SPA 路由 (解决刷新 404)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    
    
    # 2. 业务 API 代理 (发往后端 backend-svc)
    location /api/ {
        proxy_pass http://backend-service.default.svc.cluster.local:5000/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==========================================
    # 3. SRE 专属：K8s 健康检查接口 (新增)
    # ==========================================
    location /health {
        # 关闭访问日志，防止 Kubelet 每 10 秒检查一次把日志打满
        access_log off; 
        # 返回 200 状态码和 JSON 格式的健康状态
        default_type application/json;
        return 200 '{"status":"UP", "service":"frontend"}';
    }
}
