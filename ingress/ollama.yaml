# 若已用 HTTPS 访问（websecure + 证书），把 url 改成 https://你的域名，并相应使用 entryPoints: websecure。
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: ollama-http
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    # UI / gRPC-Web 等走 HTTP/1.1 → 80（要求 server.insecure=true）
    - match: Host(`ollama.zhangtao1994hk.asia`)
      priority: 10
      kind: Rule
      services:
        - name: ollama
          port: 11434
          passHostHeader: true
