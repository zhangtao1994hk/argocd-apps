# 1. 强制指定部署模式，这必须在最外层
deploymentMode: SingleBinary

# 2. Loki 服务器本身的基础配置
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  # 必须提供一个简单的 schema_config，否则会报错
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# 3. 显式禁用分布式组件，防止 Chart 校验逻辑报错
backend:
  replicas: 0
write:
  replicas: 0
read:
  replicas: 0
gateway:
  enabled: false

# 4. 单节点配置
singleBinary:
  replicas: 1
