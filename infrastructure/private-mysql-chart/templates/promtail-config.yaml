apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-promtail-config
  namespace: middleware
  labels:
    app: mysql
data:
  promtail.yaml: |
    # Promtail Sidecar - 仅采集 MySQL 慢查询日志
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki-app.monitoring.svc:3100/loki/api/v1/push
        batchwait: 5s
        batchsize: 1048576
        timeout: 10s

    scrape_configs:
      - job_name: mysql-slow-query
        static_configs:
          - targets:
              - localhost
            labels:
              job: mysql-slow-query
              app: mysql
              __path__: /var/log/mysql/mysql-slow.log
        pipeline_stages:
          # 将多行慢查询日志合并为一条日志条目
          - multiline:
              firstline: '^# Time:'
          # 提取关键字段
          - regex:
              expression: |
                ^# Time: (?P<time>\S+)\n
                # User@Host: (?P<user>[^\[]+).*Id:\s+(?P<thread_id>\d+)\n
                # Query_time: (?P<query_time>\S+)\s+Lock_time: (?P<lock_time>\S+)\s+Rows_sent: (?P<rows_sent>\d+)\s+Rows_examined: (?P<rows_examined>\d+)
          # 使用提取的时间戳
          - timestamp:
              source: time
              format: RFC3339
          # 将关键指标转换为 label，便于 LogQL 查询和告警
          - labels:
              query_time:
              lock_time:
              rows_sent:
              rows_examined:
              user:
