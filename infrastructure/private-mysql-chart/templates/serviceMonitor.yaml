apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mysql-exporter
  namespace: middleware
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: mysql
  endpoints:
    - port: metrics
      interval: 15s
      scrapeTimeout: 10s
      path: /metrics
      honorLabels: true
    - port: promtail-metrics
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
