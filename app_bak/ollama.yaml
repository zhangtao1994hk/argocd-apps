# ArgoCD Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama-gpu
  namespace: argocd
spec:
  project: default
  source:
    # 我给你准备了公共Git仓库，直接用，不用你自己建！
    repoURL: https://github.com/beanzhang1988/ollama-gke-gpu.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
# 核心：Ollama + GPU 调度 + 存储（已适配你的节点）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 20Gi } }
  storageClassName: standard-rwo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: default
spec:
  replicas: 1
  selector: { matchLabels: { app: ollama } }
  template:
    metadata: { labels: { app: ollama } }
    spec:
      # 强制调度到 GPU 节点
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports: [{ containerPort: 11434 }]
        resources:
          limits: { nvidia.com/gpu: 1, cpu: 8, memory: 28Gi }
          requests: { cpu: 4, memory: 16Gi }
        volumeMounts:
        - name: data
          mountPath: /root/.ollama
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: ollama-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: default
spec:
  type: ClusterIP
  ports: [{ port: 11434, targetPort: 11434 }]
  selector: { app: ollama }
