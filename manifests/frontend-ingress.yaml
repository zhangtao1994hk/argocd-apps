apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: default
  annotations:
    # 这里告诉 Traefik 使用 entrypoint 为 web (通常是 80 端口)
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: frontend.local  # 你可以改成你喜欢的域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service # 确保这个 Service 名称和你创建的一致
            port:
              number: 5000
