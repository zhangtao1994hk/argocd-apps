# 1. 监控 argocd-metrics (Controller)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-metrics
  namespace: argocd # 请确保这是你安装 ArgoCD 的命名空间
  labels:
    release: kube-prometheus-stack # 必须要有这个标签
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-metrics
  endpoints:
  - port: metrics
    interval: 30s
---
