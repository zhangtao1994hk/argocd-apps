apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - backend-rollout.yaml
  - dao-rollout.yaml
  - frontend-rollout.yaml
  - frontend-service.yaml
  - frontend-ingress.yaml
  - frontend-analysis-template.yaml
  - hpa.yaml

images:
  - name: backend-image
    newName: ghcr.io/zhangtao1994hk/argocd-apps/backend
  - name: dao-image
    newName: ghcr.io/zhangtao1994hk/argocd-apps/dao
  - name: frontend-image
    newName: ghcr.io/zhangtao1994hk/argocd-apps/frontend
