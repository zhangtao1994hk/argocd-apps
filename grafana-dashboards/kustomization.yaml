apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: grafana-dashboards
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: "Application"
    files:
      - lgtm-dashboard.json
      - node-exporter-full.json
