name: Build and Push Backend Image

permissions:
  contents: write

on:
  push:
    paths:
      - 'backend/**' # 只有 backend 目录有变动才触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 允许写入容器镜像

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update backend image tag in K8s manifest
        run: |
          # 指定更新 manifests/backend-deploy.yaml
          # 使用 sed 替换 image 字段
          sed -i "s|image: ghcr.io/zhangtao1994hk/argocd-apps/backend:.*|image: ghcr.io/zhangtao1994hk/argocd-apps/backend:${{ github.sha }}|g" manifests/backend-deploy.yaml

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 只提交修改过的那个 yaml 文件
          git add manifests/backend-deploy.yaml
          
          # 提交并推送到 GitHub
          git commit -m "chore(backend): update image to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
